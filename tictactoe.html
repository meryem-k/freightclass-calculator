<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    .container {
      text-align: center;
    }

    h1 {
      font-size: 2.5rem;
      letter-spacing: 4px;
      margin-bottom: 1rem;
      color: #e0e0e0;
    }

    .status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.6em;
      color: #a0c4ff;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 10px;
      margin: 0 auto 1.8rem;
      width: fit-content;
    }

    .cell {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 12px;
      cursor: pointer;
      font-size: 3rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.04);
    }

    .cell.taken { cursor: default; }

    .cell.x { color: #ff6b6b; }
    .cell.o { color: #4ecdc4; }

    .cell.win {
      background: #0f3460;
      border-color: #a0c4ff;
      animation: pulse 0.6s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    .btn {
      background: #0f3460;
      color: #a0c4ff;
      border: 2px solid #a0c4ff;
      border-radius: 8px;
      padding: 0.6rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 1px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .btn:hover {
      background: #a0c4ff;
      color: #1a1a2e;
    }

    .score {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-bottom: 1.5rem;
      font-size: 1rem;
      color: #888;
    }

    .score span { font-weight: 700; }
    .score .sx { color: #ff6b6b; }
    .score .so { color: #4ecdc4; }
    .score .sd { color: #aaa; }
  </style>
</head>
<body>
  <div class="container">
    <h1>TIC TAC TOE</h1>
    <div class="score">
      <div>X <span class="sx" id="scoreX">0</span></div>
      <div>Draws <span class="sd" id="scoreDraw">0</span></div>
      <div>O <span class="so" id="scoreO">0</span></div>
    </div>
    <div class="status" id="status">X's turn</div>
    <div class="board" id="board">
      <div class="cell" data-i="0"></div>
      <div class="cell" data-i="1"></div>
      <div class="cell" data-i="2"></div>
      <div class="cell" data-i="3"></div>
      <div class="cell" data-i="4"></div>
      <div class="cell" data-i="5"></div>
      <div class="cell" data-i="6"></div>
      <div class="cell" data-i="7"></div>
      <div class="cell" data-i="8"></div>
    </div>
    <button class="btn" id="restart">Restart</button>
  </div>

  <script>
    const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    let board, current, gameOver, scores = {X:0, O:0, D:0};

    function init() {
      board = Array(9).fill(null);
      current = 'X';
      gameOver = false;
      document.querySelectorAll('.cell').forEach(c => {
        c.textContent = '';
        c.className = 'cell';
      });
      setStatus("X's turn");
    }

    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }

    function updateScores() {
      document.getElementById('scoreX').textContent = scores.X;
      document.getElementById('scoreO').textContent = scores.O;
      document.getElementById('scoreDraw').textContent = scores.D;
    }

    function checkWin() {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return [a, b, c];
        }
      }
      return null;
    }

    document.getElementById('board').addEventListener('click', e => {
      const cell = e.target.closest('.cell');
      if (!cell || gameOver || cell.classList.contains('taken')) return;

      const i = +cell.dataset.i;
      board[i] = current;
      cell.textContent = current;
      cell.classList.add('taken', current.toLowerCase());

      const win = checkWin();
      if (win) {
        win.forEach(idx => document.querySelector(`[data-i="${idx}"]`).classList.add('win'));
        setStatus(`${current} wins!`);
        scores[current]++;
        updateScores();
        gameOver = true;
        return;
      }

      if (board.every(Boolean)) {
        setStatus("It's a draw!");
        scores.D++;
        updateScores();
        gameOver = true;
        return;
      }

      current = current === 'X' ? 'O' : 'X';
      setStatus(`${current}'s turn`);
    });

    document.getElementById('restart').addEventListener('click', init);

    init();
  </script>
</body>
</html>
